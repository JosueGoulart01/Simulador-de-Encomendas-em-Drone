# ===================================================================
# CONFIGURAÇÕES DO SERVIDOR
# ===================================================================
server.port=${PORT:8080}
spring.application.name=Simulador-de-Encomendas-em-Drone

# ===================================================================
# CONFIGURAÇÕES DO BANCO DE DADOS (POSTGRESQL)
# ===================================================================
# Usa variáveis de ambiente com fallback para desenvolvimento local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/simulador_drones}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURAÇÕES DO JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostra as queries SQL (desative em produção se quiser menos logs)
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

# ===================================================================
# CONFIGURAÇÕES DE HORA E IDIOMA (JACKSON)
# ===================================================================
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false

# ===================================================================
# CONFIGURAÇÕES DE LOG
# ===================================================================
logging.level.com.example.Simulador_de_Encomendas_em_Drone=${LOG_LEVEL:INFO}